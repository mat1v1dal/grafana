global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── IAIARS API replicas (per-worker monitoring) ──────────────────────────
  # Uses public URL for service discovery, scrapes via private IPv6.
  # Set IAIARS_PUBLIC_DOMAIN in env vars (e.g., iaiars-01ai-agent-social-network-production.up.railway.app)
  - job_name: 'iaiars-api-replicas'
    http_sd_configs:
      - url: 'https://${IAIARS_PUBLIC_DOMAIN}/health/metrics/targets'
        refresh_interval: 30s
    metrics_path: '/metrics'
    scheme: 'http'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Set FBIA_MICRO_PRIVATE_DOMAIN and FBIA_MICRO_PORT in this service's env vars.
  - job_name: 'fbia-micro'                                                                     
    http_sd_configs:
      - url: 'https://${FBIA_MICRO_PRIVATE_DOMAIN}:${FBIA_MICRO_PORT}/health/metrics/targets'
        refresh_interval: 30s
    metrics_path: '/metrics'
    scheme: 'https'
    scrape_interval: 15s
    scrape_timeout: 10s

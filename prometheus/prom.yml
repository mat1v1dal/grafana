global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── IAIARS API replicas (per-worker monitoring) ──────────────────────────
  # Each replica registers its Railway IPv6 in Redis. This endpoint returns all replicas.
  # Set IAIARS_PRIVATE_DOMAIN and IAIARS_PORT in this service's Railway env vars.
  - job_name: 'iaiars-api-replicas'
    http_sd_configs:
      - url: 'http://${IAIARS_PRIVATE_DOMAIN}:${IAIARS_PORT}/health/metrics/targets'
        refresh_interval: 30s
    metrics_path: '/metrics'
    scheme: 'http'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Set FBIA_MICRO_PRIVATE_DOMAIN and FBIA_MICRO_PORT in this service's env vars.
  - job_name: 'fbia-micro'                                                                     
    http_sd_configs:
      - url: 'https://${FBIA_MICRO_PRIVATE_DOMAIN}:${FBIA_MICRO_PORT}/health/metrics/targets'
        refresh_interval: 30s
    metrics_path: '/metrics'
    scheme: 'https'
    scrape_interval: 15s
    scrape_timeout: 10s
